name: Upload

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:

      - uses: actions/checkout@v5

      - name: Snapshot nightly archive (retain 7)
        run: |
          set -euo pipefail

          if [[ ! -f nightly/git-revision.txt ]]; then
            echo "nightly/git-revision.txt not found; skipping snapshot."
            exit 0
          fi

          current_revision="$(tr -d '\r\n' < nightly/git-revision.txt)"
          latest_snapshot="$(find . -maxdepth 1 -mindepth 1 -type d -name 'snapshot_*' -printf '%f\n' | sort -r | head -n 1 || true)"
          latest_revision=""

          if [[ -n "${latest_snapshot}" && -f "${latest_snapshot}/git-revision.txt" ]]; then
            latest_revision="$(tr -d '\r\n' < "${latest_snapshot}/git-revision.txt")"
          fi

          if [[ "${current_revision}" != "${latest_revision}" ]]; then
            snapshot_dir="snapshot_$(date -u +%Y-%m-%dT%H:%M:%SZ)"
            cp -a nightly "${snapshot_dir}"
            echo "Created ${snapshot_dir} for revision ${current_revision}."
          else
            echo "No new nightly revision; snapshot not created."
          fi

          mapfile -t snapshot_dirs < <(find . -maxdepth 1 -mindepth 1 -type d -name 'snapshot_*' -printf '%f\n' | sort -r)
          if (( ${#snapshot_dirs[@]} > 7 )); then
            for old_snapshot in "${snapshot_dirs[@]:7}"; do
              rm -rf "${old_snapshot}"
              echo "Removed old snapshot ${old_snapshot}."
            done
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --cached --quiet; then
            echo "No snapshot changes to commit."
            exit 0
          fi

          git commit -m "archive: update nightly snapshots"
          git push origin HEAD:main

      - run: |
          rm -rf .github
          find . -maxdepth 1 -type f -delete
          mv main/* ./
          mv main-extra/* ./
          rm -rf main main-extra

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy ./ --project-name=paiagram --branch=main
